<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Tarefas</title>
</head>
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Tarefas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Cadastro de Tarefas</h1>

    <ul>
    {% for tarefa in tarefas %}
        <li>
            <strong>{{ tarefa[1] }}</strong>: {{ tarefa[2] }}
            <!-- Formulário para deletar a tarefa -->
            <form method="POST" action="/delete/{{ tarefa[0] }}" style="display:inline;">
                <button type="submit">Deletar</button>
            </form>
        </li>
    {% endfor %}
</ul>

    <form method="POST">
        <input type="text" name="titulo" placeholder="Título da tarefa" required>
        <br><br>
        <textarea name="descricao" placeholder="Descrição"></textarea>
        <br><br>
        <button type="submit">Adicionar Tarefa</button>
    </form>

    <h2>Tarefas cadastradas:</h2>
    <ul>
        {% for tarefa in tarefas %}
            <li><strong>{{ tarefa[1] }}</strong>: {{ tarefa[2] }}</li>
        {% endfor %}
    </ul>

</body>
</html>
